<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Course Registration System</title>
    <link rel="stylesheet" href="login-style.css">
    <style>
        .step {
            display: none;
        }
        .step.active {
            display: block;
            animation: slideIn 0.5s ease;
        }
        .otp-hint {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-card">
        <div class="login-header">
            <h1>Reset Password</h1>
            <p>Recover access to your account</p>
        </div>

        <!-- STEP 1: Request Verification Code -->
        <div id="step1" class="step active">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="Enter your registered email" required>
                </div>
            </div>
            
            <button id="sendCodeBtn" class="btn-login">
                <span class="btn-text">Send Verification Code</span>
            </button>
        </div>

        <!-- STEP 2: Verify Code and Reset Password -->
        <div id="step2" class="step">
            <div class="otp-hint">
                ✉️ A verification code has been sent to your email. Enter it below to proceed.
            </div>

            <div class="form-group">
                <label for="code">Verification Code</label>
                <div class="input-wrapper">
                    <input type="text" id="code" placeholder="6-digit code" maxlength="6" required>
                </div>
            </div>

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" placeholder="••••••••" required>
                </div>
            </div>
            
            <button id="resetPasswordBtn" class="btn-login" style="background: #10b981;">
                <span class="btn-text">Update Password</span>
            </button>
        </div>

        <div id="messageBox" class="login-message"></div>

        <div class="links" style="justify-content: center;">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>

    <script src="notifications.js"></script>
    <script src="forgot-password.js"></script>
</body>
</html>

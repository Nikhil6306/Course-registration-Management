<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Course Registration System</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <!-- Animated Background Shapes -->
    <div class="bg-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-card">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Enter your credentials to access your dashboard</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="e.g. john_doe" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" id="loginBtn" class="btn-login">
                <span class="spinner"></span>
                <span class="btn-text">Login to Dashboard</span>
            </button>

            <div id="forgotPasswordContainer" class="forgot-password-link">
                <p>Forgot your password? <a href="forgot-password.html">Reset it here</a></p>
            </div>
        </form>

        <div id="loginMessage" class="login-message"></div>

        <div class="links">
            <a href="signup.html">Create an Account</a>
            <a href="index.html">Back to Home</a>
        </div>

        <!-- Demo Accounts Hint (Subtle) -->
        <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.75rem; color: rgba(255,255,255,0.4); text-align: center;">
            <p>Demo: student, teacher, hod / password123</p>
        </div>
    </div>

    <script src="notifications.js"></script>
    <script src="login.js"></script>
</body>
</html>

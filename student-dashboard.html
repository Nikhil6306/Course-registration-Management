<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Course Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <span>🎓 Student Portal</span>
                </div>
            </div>
            
            <nav class="nav" id="mainNav">
                <button class="nav-btn active" data-tab="syllabus" id="nav-syllabus">
                    <span>📖</span> <span>Course Syllabus</span>
                </button>
                <button class="nav-btn" data-tab="profile" id="nav-profile">
                    <span>👤</span> <span>My Profile</span>
                </button>
                <!-- Hidden tabs for consistency with script.js selectors -->
                <button id="nav-view" style="display: none;"></button>
                <button id="nav-my-courses" style="display: none;"></button>
                <button id="nav-search" style="display: none;"></button>
                <button id="nav-create" style="display: none;"></button>
                <button id="nav-update" style="display: none;"></button>
                <button id="nav-stats" style="display: none;"></button>
                <button id="nav-users" style="display: none;"></button>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-mini-profile">
                    <img id="headerProfileImg" src="https://via.placeholder.com/40" alt="Profile" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
                    <div class="user-info">
                        <div id="userNameDisplay" style="font-weight: bold; font-size: 0.85em;">User</div>
                        <div id="userRoleBadge" style="font-size: 0.7em; opacity: 0.8; text-transform: uppercase;">ROLE</div>
                    </div>
                </div>
                <button id="logoutBtn" class="btn btn-danger" style="width: 100%; margin-top: 15px; padding: 10px; font-size: 0.9em;">Logout</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1 id="headerTitle">Student Portal</h1>
                    <p id="headerSubtitle" class="subtitle">Access your course materials and syllabus</p>
                </div>
                <div class="top-bar-actions">
                    <button id="themeToggleBtn" style="background: transparent; border: none; font-size: 1.5em; cursor: pointer;" title="Toggle Theme">🌙</button>
                </div>
            </header>

        <!-- SYLLABUS TAB -->
        <section id="syllabus" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Academic Course Syllabus</h2>
                <button id="refreshSyllabusBtn" class="btn btn-secondary">Refresh</button>
            </div>
            <div id="syllabusList" class="courses-grid">
                <p>Loading course syllabi...</p>
            </div>
        </section>

        <!-- Hidden sections to avoid script.js errors -->
        <section id="view" class="tab-content" style="display: none;"></section>
        <section id="my-courses" class="tab-content" style="display: none;"></section>
        <section id="search" class="tab-content" style="display: none;"></section>
        <section id="create" class="tab-content" style="display: none;"></section>
        <section id="update" class="tab-content" style="display: none;"></section>
        <section id="stats" class="tab-content" style="display: none;"></section>
        
        <!-- PROFILE TAB -->
        <section id="profile" class="tab-content">
            <h2>My Profile Settings</h2>
            <form id="profileForm" class="form">
                <div class="form-group" style="text-align: center; margin-bottom: 20px;">
                    <img id="profilePreview" src="https://via.placeholder.com/100" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #667eea; margin-bottom: 10px;">
                    <input type="file" id="profileImage" accept="image/png, image/jpeg, image/gif" style="display: none;">
                    <br>
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('profileImage').click()">Change Picture</button>
                </div>
                <div class="form-group">
                    <label for="profileName">Full Name:</label>
                    <input type="text" id="profileName" placeholder="e.g., John Doe" readonly>
                    <p style="font-size: 0.8em; color: #888; margin-top: 5px;">* Contact Admin to change your name</p>
                </div>
                <div class="form-group">
                    <label for="profileEmail">Email Address:</label>
                    <input type="email" id="profileEmail" placeholder="e.g., john@example.com" readonly>
                </div>
                <div class="form-group">
                    <label for="profilePhone">Phone Number:</label>
                    <input type="text" id="profilePhone" placeholder="e.g., +1 234 567 8900" readonly>
                </div>
                <div class="message info" style="display: block;">
                    🔒 Profile editing is disabled for students. Please contact the Administrator for any changes.
                </div>
            </form>
            <div id="profileMessage" class="message"></div>
        </section>

        <!-- Hidden sections to avoid script.js errors -->
        <section id="create" class="tab-content" style="display: none;"></section>
        <section id="update" class="tab-content" style="display: none;"></section>
        <section id="stats" class="tab-content" style="display: none;"></section>
    </main>
</div>

    <script src="notifications.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>

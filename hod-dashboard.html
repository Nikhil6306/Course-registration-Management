<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOD Dashboard - Course Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <span>🏛️ HOD Portal</span>
                </div>
            </div>
            
            <nav class="nav" id="mainNav">
                <button class="nav-btn active" data-tab="view" id="nav-view">
                    <span>📚</span> <span>Dept. Courses</span>
                </button>
                <button class="nav-btn" data-tab="create" id="nav-create">
                    <span>➕</span> <span>Add Course</span>
                </button>
                <button class="nav-btn" data-tab="update" id="nav-update">
                    <span>🔄</span> <span>Update Course</span>
                </button>
                <button class="nav-btn" data-tab="search" id="nav-search">
                    <span>🔍</span> <span>Search</span>
                </button>
                <button class="nav-btn" data-tab="stats" id="nav-stats">
                    <span>📊</span> <span>Dept. Stats</span>
                </button>
                <button class="nav-btn" data-tab="profile" id="nav-profile">
                    <span>👤</span> <span>Profile</span>
                </button>
                <button id="nav-users" style="display: none;"></button>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-mini-profile">
                    <img id="headerProfileImg" src="https://via.placeholder.com/40" alt="Profile" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
                    <div class="user-info">
                        <div id="userNameDisplay" style="font-weight: bold; font-size: 0.85em;">User</div>
                        <div id="userRoleBadge" style="font-size: 0.7em; opacity: 0.8; text-transform: uppercase;">ROLE</div>
                    </div>
                </div>
                <button id="logoutBtn" class="btn btn-danger" style="width: 100%; margin-top: 15px; padding: 10px; font-size: 0.9em;">Logout</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1 id="headerTitle">HOD Dashboard</h1>
                    <p id="headerSubtitle" class="subtitle">Departmental Administration and Monitoring</p>
                </div>
                <div class="top-bar-actions">
                    <button id="themeToggleBtn" style="background: transparent; border: none; font-size: 1.5em; cursor: pointer;" title="Toggle Theme">🌙</button>
                </div>
            </header>

        <!-- VIEW TAB -->
        <section id="view" class="tab-content active">
            <h2>Courses List</h2>
            <div class="controls" style="display: flex; gap: 15px; align-items: center; margin-bottom: 20px;">
                <select id="departmentFilter" style="flex: 1; padding: 10px; border-radius: 8px; border: 2px solid #e9ecef;">
                    <option value="">All Departments</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Physics">Physics</option>
                    <option value="Business">Business</option>
                    <option value="Engineering">Engineering</option>
                </select>
                <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
            </div>
            <div id="coursesList" class="courses-grid">
                <p>Loading courses...</p>
            </div>
        </section>

        <!-- CREATE TAB -->
        <section id="create" class="tab-content">
            <h2>Add New Course</h2>
            <form id="createForm" class="form">
                <div class="form-group">
                    <label for="courseCode">Course Code:</label>
                    <input type="text" id="courseCode" placeholder="e.g., CS101" required>
                </div>
                <div class="form-group">
                    <label for="courseName">Course Name:</label>
                    <input type="text" id="courseName" placeholder="e.g., Introduction to Computer Science" required>
                </div>
                <div class="form-group">
                    <label for="department">Department:</label>
                    <input type="text" id="department" placeholder="e.g., Computer Science" required>
                </div>
                <div class="form-group">
                    <label for="instructor">Instructor:</label>
                    <input type="text" id="instructor" placeholder="e.g., Dr. John Doe" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="credits">Credits:</label>
                        <input type="number" id="credits" min="1" max="6" placeholder="e.g., 3" required>
                    </div>
                    <div class="form-group">
                        <label for="capacity">Capacity:</label>
                        <input type="number" id="capacity" min="1" placeholder="e.g., 30" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="schedule">Schedule:</label>
                    <input type="text" id="schedule" placeholder="e.g., Mon & Wed 10:00 AM">
                </div>
                <button type="submit" class="btn btn-primary">Add Course</button>
            </form>
            <div id="createMessage" class="message"></div>
        </section>

        <!-- UPDATE TAB -->
        <section id="update" class="tab-content">
            <h2>Update Course</h2>
            <form id="updateForm" class="form">
                <div class="form-group">
                    <label for="updateCourseId">Course ID:</label>
                    <input type="text" id="updateCourseId" placeholder="Paste ID here" required>
                </div>
                <div id="updateFields" style="display: none;">
                    <div class="form-group">
                        <label for="updateCourseName">Course Name:</label>
                        <input type="text" id="updateCourseName">
                    </div>
                    <div class="form-group">
                        <label for="updateDepartment">Department:</label>
                        <input type="text" id="updateDepartment">
                    </div>
                    <div class="form-group">
                        <label for="updateInstructor">Instructor:</label>
                        <input type="text" id="updateInstructor">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="updateCredits">Credits:</label>
                            <input type="number" id="updateCredits" min="1" max="6">
                        </div>
                        <div class="form-group">
                            <label for="updateCapacity">Capacity:</label>
                            <input type="number" id="updateCapacity" min="1">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="updateDescription">Description:</label>
                        <textarea id="updateDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="updateSchedule">Schedule:</label>
                        <input type="text" id="updateSchedule">
                    </div>
                    <button type="submit" class="btn btn-primary">Update Course</button>
                </div>
                <button type="button" id="loadCourseBtn" class="btn btn-secondary">Load Course</button>
            </form>
            <div id="updateMessage" class="message"></div>
        </section>

        <!-- SEARCH TAB -->
        <section id="search" class="tab-content">
            <h2>Search Course</h2>
            <div class="form">
                <div class="form-group">
                    <label for="searchCourseCode">Enter Course Code:</label>
                    <input type="text" id="searchCourseCode">
                </div>
                <button id="searchBtn" class="btn btn-primary">Search</button>
            </div>
            <div id="searchResult" class="message"></div>
            <div id="searchCourseDetail" class="course-card"></div>
        </section>

        <!-- STATISTICS TAB -->
        <section id="stats" class="tab-content">
            <h2>Department Statistics</h2>
            <div id="statsContainer" class="stats-grid"></div>
        </section>

        <!-- PROFILE TAB -->
        <section id="profile" class="tab-content">
            <h2>My Profile</h2>
            <form id="profileForm" class="form">
                <div class="form-group">
                    <label for="profileName">Name:</label>
                    <input type="text" id="profileName">
                </div>
                <div class="form-group">
                    <label for="profileEmail">Email:</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="email" id="profileEmail" placeholder="e.g., john@example.com" style="flex: 1;">
                        <button type="button" id="verifyEmailBtn" class="btn btn-secondary" style="white-space: nowrap; padding: 10px 15px;">Send Verification</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="profilePhone">Phone:</label>
                    <input type="text" id="profilePhone">
                </div>
                <button type="submit" class="btn btn-primary">Save Profile</button>
            </form>
            <div id="profileMessage" class="message"></div>
        </section>
    </main>
</div>

    <!-- Modal for Delete Confirmation -->
    <div id="deleteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Confirm Delete</h3>
            <p>Are you sure you want to delete this course?</p>
            <div class="modal-buttons">
                <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
                <button id="cancelDeleteBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="notifications.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
